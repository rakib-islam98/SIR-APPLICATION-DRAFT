<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter Appeal System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    text-align: center;
}
h2 {
    margin-bottom: 20px;
}
button {
    width: 200px;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
.old-btn {
    background: #6c757d;
    color: white;
}
.old-btn:hover {
    background: #5a6268;
}
.new-btn {
    background: #007BFF;
    color: white;
}
.new-btn:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="container">
    <h2>Select Appeal Format</h2>

    <button class="old-btn" onclick="goToPage('old.html')">
        Old Format
    </button>

    <button class="new-btn" onclick="goToPage('new.html')">
        New Format
    </button>
</div>

<script>
function goToPage(page) {
    window.location.href = page;
}
</script>

</body>
</html>
